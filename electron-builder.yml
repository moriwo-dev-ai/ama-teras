appId: local.amateras.app
productName: AMA-teras
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json
# 動的ロードするプラグインの .ts ソースを同梱する(asar内srcは実行時に読めないため)。
# 実行時に esbuild でトランスパイルして読むため .ts のまま resources/plugins へ置く。
extraResources:
  - from: src/main/tools/plugins
    to: plugins
    filter:
      - '**/*.ts'
      - '!**/*.test.ts'
  # M91: プラグイン単位の型検査ゲート(tools/verify.ts)が読む ToolPlugin の型。
  # プラグインの `../types` → その先の `../../shared/types` が解決できるよう、
  # リポジトリと同じ相対配置(main/tools/types.ts, shared/types.ts)で置く
  - from: src/main/tools/types.ts
    to: plugin-api/main/tools/types.ts
  - from: src/shared/types.ts
    to: plugin-api/shared/types.ts
  # M91: TypeScript の標準ライブラリ(lib.*.d.ts)。asar 内の typescript/lib は
  # バンドル済み main からは辿れず、型検査が「Cannot find global type 'Array'」で全滅する
  # (配布版で実測)。推測させず、ここに置いたものを明示的に渡す
  - from: node_modules/typescript/lib
    to: ts-lib
    filter:
      - 'lib*.d.ts'
  # 同じ理由で @types/node も外に出す(asar 内の型定義は TS のファイル解決から見えなかった)
  - from: node_modules/@types/node
    to: ts-types/node
# esbuild はネイティブバイナリを持つため asar から展開しないと実行できない
asarUnpack:
  - node_modules/esbuild/**
  - node_modules/@esbuild/**
win:
  icon: build/icon.ico
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
