<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- iOSでズームを禁止(maximum-scale=1)すると、入力欄フォーカス時の自動ズームが
         潰れてキーボードが上がらない端末がある。ズームは許可し、入力欄は16px以上にして
         フォーカス時ズーム自体を不要にする(styles.css 側)。 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AMA-teras" />
    <meta name="theme-color" content="#18181b" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <title>AMA-teras Remote</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
